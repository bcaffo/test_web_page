<!DOCTYPE html>
<html>
<head>
    <title>My Simple Page</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 300px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, World!</h1>
        <p>This is my first web page built with HTML and CSS.</p>
        <button onclick="greet()">Click Me</button>
    </div>

    <script>
        function greet() {
            alert("Thanks for stopping by!");
        }
    </script>

</body>
</html>
